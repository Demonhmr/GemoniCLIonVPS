version: '3.9'

# =============================================================================
# Gemini CLI Service — security-hardened
# Access:   SSH to VPS host → make attach (docker exec + tmux)
# Auth:     Google OAuth — tokens persisted in named volume
# No ports: zero network exposure from container side
# =============================================================================

services:
  gemini-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemini-cli-service
    restart: unless-stopped

    # -------------------------------------------------------------------------
    # RAM limits (direct syntax — works WITHOUT Docker Swarm)
    # -------------------------------------------------------------------------
    mem_limit: 512m
    mem_reservation: 128m
    oom_kill_disable: false   # allow OOM killer — better than hanging VPS

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN      # entrypoint.sh needs this to fix Docker volume ownership at startup
      - SETUID     # gosu needs this to drop from root to gemini
      - SETGID     # gosu needs this to drop from root to gemini

    # -------------------------------------------------------------------------
    # No ports published — container is unreachable from the network
    # Access exclusively via: docker exec -it gemini-cli-service ...
    # -------------------------------------------------------------------------

    volumes:
      # Gemini CLI config, credentials & project registry — NEVER docker volume rm this!
      - gemini-config:/home/gemini/.gemini

      # Persistent working directory — your projects survive container rebuilds
      - workspace:/workspace

    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8
    env_file:
      - path: .env
        required: false   # container starts even without .env (OAuth fallback)

  # ===========================================================================
  # Telegram Bot Service
  # ===========================================================================
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemini-cli-telegram-bot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_CHAT_ID=${ALLOWED_CHAT_ID}
    volumes:
      - gemini-config:/home/gemini/.gemini
      - workspace:/workspace
    working_dir: /workspace/bot
    # the container entrypoint properly drops root to gemini, and npm start spawns the bot
    command: ["npm", "start"]
    depends_on:
      - gemini-cli

volumes:
  # Gemini CLI config + OAuth credentials — survives container rebuilds
  gemini-config:
    driver: local

  # Persistent workspace for projects and files
  workspace:
    driver: local
