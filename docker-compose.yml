version: '3.9'

# =============================================================================
# Gemini CLI Service — security-hardened
# Access:   SSH to VPS host → make attach (docker exec + tmux)
# Auth:     Google OAuth — tokens persisted in named volume
# No ports: zero network exposure from container side
# =============================================================================

services:
  gemini-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemini-cli-service
    restart: unless-stopped

    # -------------------------------------------------------------------------
    # RAM limits (direct syntax — works WITHOUT Docker Swarm)
    # -------------------------------------------------------------------------
    mem_limit: 512m
    mem_reservation: 128m
    oom_kill_disable: false   # allow OOM killer — better than hanging VPS

    security_opt:
      - no-new-privileges:true   # block setuid/setgid privilege escalation
    cap_drop:
      - ALL                      # drop all Linux capabilities
    # cap_add is intentionally empty:
    # The container runs as UID 1001 (gemini) set in Dockerfile via USER directive.
    # sleep infinity requires zero capabilities. Named volumes handle file ownership.

    # -------------------------------------------------------------------------
    # No ports published — container is unreachable from the network
    # Access exclusively via: docker exec -it gemini-cli-service ...
    # -------------------------------------------------------------------------

    volumes:
      # OAuth tokens & Gemini CLI config — NEVER docker volume rm this!
      - gemini-config:/home/gemini/.config/gemini

      # Persistent working directory — your projects survive container rebuilds
      - workspace:/workspace

    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8

volumes:
  # Google OAuth credentials — survives container rebuilds
  gemini-config:
    driver: local

  # Persistent workspace for projects and files
  workspace:
    driver: local
