# =============================================================================
# tmux configuration for Gemini CLI container
# =============================================================================

# Set prefix to Ctrl+A (easier than Ctrl+B on many keyboards)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support disabled — causes input freezing in Windows SSH clients (Windows Terminal)
# Uncomment the line below only if connecting from Linux/macOS:
# set -g mouse on

# 256-color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Start window/pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Longer scrollback buffer
set -g history-limit 10000

# Faster key response
set -s escape-time 50

# Status bar styling
set -g status-style bg=colour235,fg=colour136
set -g status-left "#[fg=colour33,bold] 🤖 Gemini CLI #[fg=colour235]|"
set -g status-right "#[fg=colour136] %H:%M %d-%b "
set -g status-left-length 30
set -g status-interval 5

# Active window highlight
setw -g window-status-current-style fg=colour166,bold

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "tmux config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with Alt+Arrow (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
